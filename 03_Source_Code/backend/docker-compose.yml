name: ki_project_backend
services:
  # 1. Service untuk Backend
  ki_backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ki_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./storage:/src/storage
    restart: unless-stopped

  # 2. Service untuk Database PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6969:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
    name: ki_pg_data
